name: Kernel Fuzzer Pipeline
on:
  push:
    branches: [main]
jobs:
  fuzz-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: sudo apt-get update -qq && sudo apt-get install -y clang afl++
      - name: Build
        run: clang++ -fsanitize=fuzzer,address -g kernel/harness/kernel_harness.cc -o kernel_fuzzer
      - name: Fuzz
        run: |
          mkdir -p kernel/output
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 timeout 300 ./kernel_fuzzer kernel/seeds/ -max_total_time=300 2>&1 | tee kernel/output/run.log || true
      - name: Discord Alert
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST "$WEBHOOK" -H "Content-Type: application/json" -d '{"content":"Kernel Fuzzer done! Results saved to artifacts."}'
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-results
          path: |
            kernel/output/run.log
            crash-*
