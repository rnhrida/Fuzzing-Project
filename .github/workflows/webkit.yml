name: WebKit Fuzzer Pipeline
on:
  push:
    branches: [main]
jobs:
  fuzz-webkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: sudo apt-get update -qq && sudo apt-get install -y clang
      - name: Build
        run: clang++ -fsanitize=fuzzer,address -g webkit/harness/html_fuzzer.cc -o webkit_fuzzer
      - name: Fuzz
        run: |
          mkdir -p webkit/output
          timeout 300 ./webkit_fuzzer webkit/seeds/ -max_total_time=300 2>&1 | tee webkit/output/run.log || true
      - name: Discord Alert
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" -H "Content-Type: application/json" -d "{"content":"WebKit Fuzzer finished! Stack-buffer-overflow detected in html_fuzzer.cc"}"
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkit-results
          path: |
            webkit/output/
            crash-*
